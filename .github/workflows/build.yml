name: build

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-release-version:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches package version
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          setup_py = Path('setup.py').read_text(encoding='utf-8')
          match = re.search(r'__version__\s*=\s*"([^"]+)"', setup_py)
          if not match:
              raise SystemExit('Could not determine package version from setup.py')

          package_version = match.group(1)
          tag = os.environ['GITHUB_REF_NAME']
          expected_tag = f'v{package_version}'
          if tag != expected_tag:
              raise SystemExit(f'Tag {tag!r} does not match package version {package_version!r}')

          print(f'Verified release tag {tag} matches package version {package_version}')
          PY

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-amd64
            python-version: "3.11"
          - os: ubuntu-24.04
            target: linux-amd64
            python-version: "3.12"
          - os: macos-14
            target: apple-arm64
            python-version: "3.11"
          - os: macos-14
            target: apple-arm64
            python-version: "3.12"

    runs-on: ${{ matrix.os }}
    env:
      OPUSCODEC_ENABLE_QEXT: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build toolchain (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config make gcc g++

      - name: Install build toolchain (macOS)
        if: runner.os == 'macOS'
        run: |
          for formula in autoconf automake libtool pkg-config; do
            brew list "$formula" >/dev/null 2>&1 || brew install "$formula"
          done

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Build + install package
        run: |
          python -m pip install -e .[test]

      - name: Unit tests
        run: |
          pytest

      - name: Build wheel
        run: |
          python -m pip wheel --no-deps --wheel-dir dist/wheels .

      - name: Build self-contained opusenc/opusdec binaries
        if: matrix.python-version == '3.11'
        run: |
          bash scripts/build_binaries.sh dist/bin ${{ matrix.target }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: opuscodec-${{ matrix.target }}-py${{ matrix.python-version }}
          path: dist/wheels/*.whl
          if-no-files-found: error

      - name: Upload binary artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: opuscodec-${{ matrix.target }}-binaries
          path: |
            dist/bin/${{ matrix.target }}/opusenc
            dist/bin/${{ matrix.target }}/opusdec
            dist/bin/${{ matrix.target }}/versions.txt
          if-no-files-found: error

  build-sdist:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build source distribution
        run: |
          python -m build --sdist --outdir dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: opuscodec-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish-github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [verify-release-version, build, build-sdist]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: opuscodec-*-py*
          path: dist/release
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: opuscodec-sdist
          path: dist/release

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: opuscodec-*-binaries
          path: dist/bin-artifacts

      - name: Package standalone binary bundles
        run: |
          set -euo pipefail
          mkdir -p dist/release
          for artifact_dir in dist/bin-artifacts/*; do
            [ -d "$artifact_dir" ] || continue
            artifact_name="$(basename "$artifact_dir")"
            target="${artifact_name#opuscodec-}"
            target="${target%-binaries}"
            tar -czf "dist/release/opuscodec-${GITHUB_REF_NAME}-${target}-binaries.tar.gz" \
              -C "$artifact_dir" opusenc opusdec versions.txt
          done
          ls -la dist/release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/release/*.whl
            dist/release/*.tar.gz

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [verify-release-version, build, build-sdist]
    runs-on: ubuntu-24.04
    permissions:
      id-token: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: opuscodec-*-py*
          path: dist/pypi
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: opuscodec-sdist
          path: dist/pypi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/pypi
