name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event_name != 'release' || startsWith(github.event.release.tag_name, 'v') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-amd64
            python-version: "3.11"
          - os: ubuntu-24.04
            target: linux-amd64
            python-version: "3.12"
          - os: macos-14
            target: apple-arm64
            python-version: "3.11"
          - os: macos-14
            target: apple-arm64
            python-version: "3.12"

    runs-on: ${{ matrix.os }}
    env:
      OPUSCODEC_ENABLE_QEXT: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build toolchain (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config make gcc g++

      - name: Install build toolchain (macOS)
        if: runner.os == 'macOS'
        run: |
          for formula in autoconf automake libtool pkg-config; do
            brew list "$formula" >/dev/null 2>&1 || brew install "$formula"
          done

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Build + install package
        run: |
          python -m pip install -e .[test]

      - name: Unit tests
        run: |
          pytest

      - name: Build wheel
        run: |
          python -m pip wheel --no-deps --wheel-dir dist/wheels .

      - name: Build self-contained opusenc/opusdec binaries
        if: matrix.python-version == '3.11'
        run: |
          bash scripts/build_binaries.sh dist/bin ${{ matrix.target }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: opuscodec-${{ matrix.target }}-py${{ matrix.python-version }}
          path: |
            dist/wheels/*.whl
          if-no-files-found: error

      - name: Upload binary artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: opuscodec-${{ matrix.target }}-binaries
          path: |
            dist/bin/${{ matrix.target }}/opusenc
            dist/bin/${{ matrix.target }}/opusdec
            dist/bin/${{ matrix.target }}/versions.txt
          if-no-files-found: error

      - name: Prepare release assets
        if: github.event_name == 'release'
        run: |
          mkdir -p dist/release
          cp dist/wheels/*.whl dist/release/
          if [ "${{ matrix.python-version }}" = "3.11" ]; then
            tar -czf "dist/release/opuscodec-${{ github.event.release.tag_name }}-${{ matrix.target }}-binaries.tar.gz" \
              -C "dist/bin/${{ matrix.target }}" opusenc opusdec versions.txt
          fi

      - name: Upload assets to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          fail_on_unmatched_files: true
          files: |
            dist/release/*.whl

      - name: Upload binary bundle to GitHub Release
        if: github.event_name == 'release' && matrix.python-version == '3.11'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          fail_on_unmatched_files: true
          files: |
            dist/release/opuscodec-${{ github.event.release.tag_name }}-${{ matrix.target }}-binaries.tar.gz
